#cloud-config
package_update: true
packages:
  - ca-certificates
  - curl
  - gnupg

write_files:
  - path: /opt/cocojambo/docker-compose.yaml
    content: |
      version: '3.8'

      services:
        frontend:
          image: caddy:2-alpine
          container_name: frontend
          restart: always
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - /opt/cocojambo/dist:/srv:ro
            - /opt/cocojambo/Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
          networks:
            cocojambo_network:
              ipv4_address: 172.40.0.20

        couchdb:
          image: couchdb:3.3
          container_name: couchdb
          restart: always
          ports:
            - "5984:5984"
          volumes:
            - couchdb_data:/opt/couchdb/data
            - couchdb_config:/opt/couchdb/etc/local.d
            - couchdb_log:/opt/couchdb/var/log
            - /opt/cocojambo/local.ini:/opt/couchdb/etc/local.d/local.ini
          environment:
            COUCHDB_USER: ${couchdb_user}
            COUCHDB_PASSWORD: ${couchdb_password}
          networks:
            cocojambo_network:
              ipv4_address: 172.40.0.10

      networks:
        cocojambo_network:
          ipam:
            driver: default
            config:
              - subnet: "172.40.0.0/24"

      volumes:
        couchdb_data:
        couchdb_config:
        couchdb_log:
        caddy_data:
        caddy_config:

  - path: /opt/cocojambo/Caddyfile
    content: |
      cocojambo-shopping.duckdns.org {
          handle_path /couchdb/* {
              reverse_proxy couchdb:5984
          }

          handle {
              root * /srv
              try_files {path} /index.html
              file_server
          }
      }

  - path: /opt/cocojambo/local.ini
    content: |
      [httpd]
      enable_cors = true

      [cors]
      origins = *
      methods = GET, PUT, POST, HEAD, DELETE
      credentials = true
      headers = accept, authorization, content-type, origin, referer

runcmd:
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable docker
  - systemctl start docker
