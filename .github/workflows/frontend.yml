name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:unit
        env:
          CYPRESS_COVERAGE: true

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CYPRESS_COVERAGE: true

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          COVERAGE=$(node -e "
            const s = require('./coverage/coverage-summary.json');
            const pct = s.total.lines.pct;
            const color = pct >= 80 ? 'brightgreen' : pct >= 60 ? 'yellow' : 'red';
            console.log(JSON.stringify({schemaVersion:1,label:'coverage',message:pct+'%',color}));
          ")
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"cocojambo-coverage.json\":{\"content\":$(echo $COVERAGE | jq -Rs .)}}}" \
            https://api.github.com/gists/9ba7c2b7782fea0f767c26be0a743f9f

      - name: Print build output
        run: ls -la dist
# dieser workflow wird jetzt korrekt in github actions ausgeführt
